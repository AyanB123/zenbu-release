<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mirror splash.html / index.html so CSS pixels map 1:1 to the
         window's content area. The launcher's BaseWindow is opened at
         splash dimensions (1100x750) and the same window is later
         handed off to setup-gate's spawnSplashWindow, which swaps the
         installing WebContentsView for the splash one in place. Same
         viewport here keeps the icon paint size stable across that
         handoff. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Read by the Zenbu launcher so the native BaseWindow's
         backgroundColor matches this page before paint. The launcher
         re-reads on theme flips, so dark-mode users see the right
         color around rounded corners during install. -->
    <meta name="zenbu-bg" content="#f4f4f4" media="(prefers-color-scheme: light)" />
    <meta name="zenbu-bg" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <title>Installing…</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f4f4f4;
        color: #1a1a1a;
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter,
          system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1a1a1a;
          color: #ededed;
        }
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        -webkit-app-region: no-drag;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Title-bar drag region — matches splash.html / TitleBar so the
         window stays draggable during the install before the renderer
         is around to claim it. */
      .drag-strip {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 30px;
        -webkit-app-region: drag;
        pointer-events: none;
      }
      .icon {
        /* Sized for the launcher's installer-shaped BaseWindow (480x320).
           Splash uses 160px at 1100x750 — keep the ratio close enough so
           the visual identity carries between the two screens. */
        width: 72px;
        height: 72px;
        image-rendering: -webkit-optimize-contrast;
        pointer-events: none;
      }
      /* Same left→right luminance sweep as updating.html / main.css's
         `.text-shimmer`, inlined because this page lives outside the
         renderer build (it loads before any user source is on disk). */
      @keyframes installing-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .label {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.005em;
        background-image: linear-gradient(
          to right,
          rgba(26, 26, 26, 0.35) 0%,
          rgba(26, 26, 26, 1) 50%,
          rgba(26, 26, 26, 0.35) 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: installing-shimmer 1.6s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .label {
          background-image: linear-gradient(
            to right,
            rgba(237, 237, 237, 0.35) 0%,
            rgba(237, 237, 237, 1) 50%,
            rgba(237, 237, 237, 0.35) 100%
          );
        }
      }
      /* Failure state: icon disappears, label stops shimmering and
         turns red, a scrollable <pre> shows the launcher's error so
         we can see what actually went wrong (network, git, pm). */
      body[data-state="error"] .icon { display: none; }
      body[data-state="error"] .label {
        background: none;
        -webkit-background-clip: initial;
        background-clip: initial;
        color: #b91c1c;
        animation: none;
      }
      @media (prefers-color-scheme: dark) {
        body[data-state="error"] .label { color: #fca5a5; }
      }
      .error {
        margin: 0 16px;
        max-width: calc(100% - 32px);
        padding: 10px 12px;
        border-radius: 6px;
        background: rgba(220, 38, 38, 0.08);
        color: #b91c1c;
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        text-align: left;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        max-height: 140px;
        overflow: auto;
        display: none;
      }
      body[data-state="error"] .error { display: block; }
      @media (prefers-color-scheme: dark) {
        .error {
          background: rgba(248, 113, 113, 0.1);
          color: #fca5a5;
        }
      }
    </style>
  </head>
  <body data-state="installing">
    <div class="drag-strip" aria-hidden="true"></div>
    <img class="icon" src="./icon.png" alt="" />
    <div class="label" id="label">Installing</div>
    <pre class="error" id="error"></pre>

    <script>
      const labelEl = document.getElementById("label");
      const errorEl = document.getElementById("error");

      function showError(payload) {
        document.body.dataset.state = "error";
        labelEl.textContent = "Install failed";
        errorEl.textContent =
          (payload && payload.message) ||
          "An unknown error occurred during installation.";
      }

      // window.zenbuInstall is exposed by @zenbujs/core's installing-preload.cjs.
      // The launcher emits five channels (step / message / progress / done /
      // error). We deliberately ignore the first four — the user only needs
      // to see one shimmering "Installing" label until the splash takes
      // over, which usually happens in a few seconds. We only break the
      // shimmer if the launcher reports a hard failure, in which case the
      // window stays open with the error message so it can be read /
      // copied / screenshotted.
      const api = window.zenbuInstall;
      if (api) {
        api.on("error", (p) => showError(p || {}));
      }
    </script>
  </body>
</html>
